name: Auditoria Técnica — Minimal Club

on:
  schedule:
    - cron: "0 12 * * 1-5"   # 09:00 BRT (UTC-3), segunda a sexta
  workflow_dispatch:
    inputs:
      url_filter:
        description: "Filtrar por URL (ex: colecoes, products) — deixe vazio para auditar tudo"
        required: false
        default: ""
      include_manual_flows:
        description: "Incluir fluxos manuais (ex: cupom de desconto)"
        type: boolean
        default: false

jobs:
  audit:
    name: Executar auditoria
    runs-on: ubuntu-latest
    timeout-minutes: 45
    permissions:
      contents: write   # necessário para publicar no gh-pages

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Configurar Python 3.11
        uses: actions/setup-python@v5
        with:
          python-version: "3.11"
          cache: "pip"

      - name: Configurar Node.js (para Lighthouse)
        uses: actions/setup-node@v4
        with:
          node-version: "20"

      - name: Instalar dependências Python
        run: pip install -e ".[dev]"

      - name: Instalar Playwright + Chromium
        run: playwright install chromium --with-deps

      - name: Instalar Lighthouse CLI
        run: npm install -g lighthouse

      - name: Restaurar histórico de auditorias
        uses: actions/cache@v4
        with:
          path: auditor-history.db
          key: audit-history-${{ github.ref_name }}-${{ github.run_number }}
          restore-keys: |
            audit-history-${{ github.ref_name }}-

      - name: Executar auditoria
        run: |
          ARGS="--scheduled"
          if [ "${{ github.event.inputs.include_manual_flows }}" = "true" ]; then
            ARGS="$ARGS --manual-only"
          fi
          if [ -n "${{ github.event.inputs.url_filter }}" ]; then
            ARGS="$ARGS --url-filter ${{ github.event.inputs.url_filter }}"
          fi
          python -m auditor run $ARGS
        continue-on-error: true

      - name: Exibir diff do dia
        run: python -m auditor diff --since 7
        continue-on-error: true

      - name: Gerar páginas estáticas
        run: python scripts/publish_pages.py
        env:
          GITHUB_REPOSITORY: ${{ github.repository }}
          ACTIONS_WORKFLOW_URL: ${{ github.server_url }}/${{ github.repository }}/actions/workflows/audit.yml

      - name: Publicar no GitHub Pages
        uses: peaceiris/actions-gh-pages@v4
        with:
          github_token: ${{ secrets.GITHUB_TOKEN }}
          publish_dir: ./gh-pages-output
          keep_files: true
          user_name: "github-actions[bot]"
          user_email: "github-actions[bot]@users.noreply.github.com"
          commit_message: "Auditoria ${{ github.run_number }} — ${{ github.event_name }}"

      - name: Upload relatório como artifact
        uses: actions/upload-artifact@v4
        if: always()
        with:
          name: auditoria-${{ github.run_number }}-${{ github.run_attempt }}
          path: reports/
          retention-days: 90
          if-no-files-found: warn
