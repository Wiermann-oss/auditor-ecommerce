name: Gerenciar Páginas da Auditoria

on:
  workflow_dispatch:
    inputs:
      add:
        description: "ADICIONAR — cole as URLs separadas por vírgula"
        type: string
        default: ""
      deactivate:
        description: "DESATIVAR — URLs separadas por vírgula (mantém no histórico)"
        type: string
        default: ""
      remove:
        description: "REMOVER definitivamente — URLs separadas por vírgula"
        type: string
        default: ""
      viewports:
        description: "Dispositivos para páginas adicionadas"
        required: false
        type: choice
        options:
          - "desktop e mobile"
          - "só desktop"
          - "só mobile"
        default: "desktop e mobile"
      run_audit:
        description: "Rodar auditoria completa após salvar?"
        type: boolean
        default: false

jobs:
  manage:
    name: Atualizar pages.yaml
    runs-on: ubuntu-latest
    permissions:
      contents: write

    steps:
      - name: Checkout
        uses: actions/checkout@v4
        with:
          ref: master

      - name: Configurar Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.11"

      - name: Instalar PyYAML
        run: pip install pyyaml

      - name: Executar manage_pages.py
        env:
          ADD_URLS:        ${{ github.event.inputs.add }}
          DEACTIVATE_URLS: ${{ github.event.inputs.deactivate }}
          REMOVE_URLS:     ${{ github.event.inputs.remove }}
          PAGE_VIEWPORTS:  ${{ github.event.inputs.viewports }}
        run: python scripts/manage_pages.py

      - name: Commit e push
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git add config/pages.yaml
          git diff --staged --quiet && echo "Nenhuma alteração." || \
            git commit -m "pages: atualização via workflow (${{ github.actor }})"
          git push origin master

      - name: Disparar auditoria completa (opcional)
        if: ${{ github.event.inputs.run_audit == 'true' }}
        uses: actions/github-script@v7
        with:
          script: |
            await github.rest.actions.createWorkflowDispatch({
              owner: context.repo.owner,
              repo: context.repo.repo,
              workflow_id: 'audit.yml',
              ref: 'master',
              inputs: { url_filter: '', include_manual_flows: 'false' }
            });
            console.log('Auditoria completa disparada.');
