name: Alterar Agenda de Auditorias

on:
  workflow_dispatch:
    inputs:
      dias:
        description: "Dias de execução"
        required: true
        type: choice
        default: "Dias úteis (seg–sex)"
        options:
          - "Dias úteis (seg–sex)"
          - "Dias úteis + sábado"
          - "Todos os dias"
          - "Apenas fins de semana"
          - "Desativado (não agendar)"
      hora:
        description: "Horário (horário de Brasília — BRT)"
        required: true
        type: choice
        default: "09:00"
        options:
          - "06:00"
          - "07:00"
          - "08:00"
          - "09:00"
          - "10:00"
          - "11:00"
          - "12:00"
          - "18:00"
          - "19:00"
          - "20:00"

jobs:
  update-schedule:
    name: Atualizar agenda
    runs-on: ubuntu-latest
    permissions:
      contents: write

    steps:
      - name: Checkout
        uses: actions/checkout@v4
        with:
          ref: master

      - name: Configurar Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.11"

      - name: Atualizar agenda
        env:
          INPUT_DIAS: ${{ github.event.inputs.dias }}
          INPUT_HORA: ${{ github.event.inputs.hora }}
        run: python scripts/update_schedule.py

      - name: Commit e push
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git add .github/workflows/audit.yml config/schedule.yaml
          git diff --staged --quiet && echo "Sem alterações." || \
            git commit -m "agenda: ${{ github.event.inputs.dias }} às ${{ github.event.inputs.hora }} BRT (${{ github.actor }})"
          git push origin master

      - name: Recuperar histórico do gh-pages
        run: |
          git fetch origin gh-pages 2>/dev/null || true
          mkdir -p gh-pages-output
          git show origin/gh-pages:reports.json > gh-pages-output/reports.json 2>/dev/null \
            || echo '[]' > gh-pages-output/reports.json
          git show origin/gh-pages:analytics.json > gh-pages-output/analytics.json 2>/dev/null \
            || echo '{}' > gh-pages-output/analytics.json

      - name: Regenerar dashboard
        run: python scripts/publish_pages.py
        env:
          GITHUB_REPOSITORY: ${{ github.repository }}
          GOOGLE_CLIENT_ID:  ${{ vars.GOOGLE_CLIENT_ID }}

      - name: Publicar no GitHub Pages
        uses: peaceiris/actions-gh-pages@v4
        with:
          github_token: ${{ secrets.GITHUB_TOKEN }}
          publish_dir: ./gh-pages-output
          keep_files: true
          user_name: "github-actions[bot]"
          user_email: "github-actions[bot]@users.noreply.github.com"
          commit_message: "Agenda: ${{ github.event.inputs.dias }} às ${{ github.event.inputs.hora }} BRT"
