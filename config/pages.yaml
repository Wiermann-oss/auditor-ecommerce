# ─────────────────────────────────────────────────────────────────────────────
# pages.yaml — Lista de páginas da auditoria
# ─────────────────────────────────────────────────────────────────────────────
#
# COMO ADICIONAR PÁGINAS (sem abrir VS Code):
#   No dashboard → aba Cobertura → botão "Editar lista"
#   Isso abre este arquivo no editor do GitHub. Copie um bloco abaixo,
#   ajuste a URL e o name, e clique em "Commit changes".
#   O dashboard atualiza sozinho em ~1 minuto.
#
# OU use Actions → "Gerenciar Páginas" → campos separados por vírgula.
#
# ─────────────────────────────────────────────────────────────────────────────
# CAMPOS:
#   name            Nome que aparece no relatório (gerado automaticamente se
#                   adicionado via workflow)
#   url             Caminho da página (sempre começa com /)
#   active          true = auditar | false = ignorar (sem deletar do arquivo)
#   viewports       [desktop, mobile] | [desktop] | [mobile]
#   lighthouse_skip true = pula métricas Lighthouse (use no /checkout)
#
# DICA RÁPIDA:
#   Adicionar  → copie um bloco, mude url e name, active: true
#   Desativar  → mude active: false  (mantém histórico)
#   Remover    → delete o bloco inteiro
# ─────────────────────────────────────────────────────────────────────────────

pages:

  # ── Páginas fixas (sempre ativas) ─────────────────────────────────────────

  - name: "Home"
    url: "/"
    active: true
    viewports: [desktop, mobile]

  - name: "Coleção — Desconto Progressivo"
    url: "/collections/desconto-progressivo-1"
    active: true
    viewports: [desktop, mobile]

  - name: "Coleção — Todas"
    url: "/collections/all"
    active: true
    viewports: [desktop, mobile]

  - name: "Página de produto (referência)"
    url: "/products/camiseta-basica"
    active: true
    viewports: [desktop, mobile]

  - name: "Carrinho"
    url: "/cart"
    active: true
    viewports: [desktop, mobile]

  - name: "Checkout (ponto de parada)"
    url: "/checkout"
    active: true
    viewports: [desktop, mobile]
    lighthouse_skip: true

  - name: "Login / Conta"
    url: "/account/login"
    active: true
    viewports: [desktop, mobile]

  # ── Páginas de campanha (ative/desative conforme a campanha) ───────────────
  # Exemplo — descomente e ajuste a URL quando ativar uma campanha:
  #
  # - name: "Landing — Campanha Verão 2026"
  #   url: "/collections/verao-2026"
  #   active: false
  #   viewports: [desktop, mobile]
  #
  # - name: "Landing — Black Friday"
  #   url: "/collections/black-friday"
  #   active: false
  #   viewports: [desktop, mobile]
